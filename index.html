<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobile Zone</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  background:#0b0b0b;
  color:white;
}

/* HEADER */
header{
  background:black;
  text-align:center;
  padding:18px;
  font-size:24px;
  font-weight:bold;
  color:red;
  border-bottom:2px solid red;
}

/* SEARCH */
.search-box{
  text-align:center;
  padding:15px;
}

.search-box input{
  width:80%;
  padding:10px;
  border-radius:20px;
  border:none;
  outline:none;
  text-align:center;
}

/* HERO */
.hero{
  text-align:center;
  padding:20px;
}

.hero h1{
  color:red;
  margin:0;
}

/* GRID */
.grid{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:15px;
  padding:10px;
}

/* CARD */
.card{
  background:#1a1a1a;
  width:170px;
  border-radius:15px;
  padding:15px;
  border:1px solid red;
  text-align:center;
}

/* IMAGE */
.card img{
  width:100%;
  border-radius:10px;
}

/* PRICE */
.price{
  color:red;
  font-weight:bold;
}

/* BUTTON */
.btn{
  display:block;
  margin-top:10px;
  padding:8px;
  background:red;
  color:white;
  border-radius:20px;
  text-decoration:none;
}

/* WHATSAPP */
.whatsapp{
  position:fixed;
  bottom:20px;
  right:20px;
  background:red;
  color:white;
  padding:14px 16px;
  border-radius:50px;
  text-decoration:none;
}
</style>

</head>

<body>

<header>
📱 MOBILE ZONE
</header>

<div class="search-box">
<input type="text" id="search" onkeyup="searchProducts()" placeholder="Search products...">
</div>

<div class="hero">
<h1>Welcome</h1>
<p>Phones • Accessories • Repair</p>
</div>

<div class="grid" id="productList">

<div class="card">
<img src="https://via.placeholder.com/150">
<h3>iPhone 13</h3>
<p class="price">R 10,500</p>
<a class="btn" href="https://wa.me/26879762802">Buy</a>
</div>

<div class="card">
<img src="https://via.placeholder.com/150">
<h3>Samsung S21</h3>
<p class="price">R 8,900</p>
<a class="btn" href="https://wa.me/26879762802">Buy</a>
</div>

<div class="card">
<img src="https://via.placeholder.com/150">
<h3>AirPods</h3>
<p class="price">R 1,200</p>
<a class="btn" href="https://wa.me/26879762802">Buy</a>
</div>

<div class="card">
<img src="https://via.placeholder.com/150">
<h3>Charger</h3>
<p class="price">R 250</p>
<a class="btn" href="https://wa.me/26879762802">Buy</a>
</div>

</div>

<a class="whatsapp" href="https://wa.me/26879762802">💬</a>

<script>
function searchProducts() {
  let input = document.getElementById("search").value.toLowerCase();
  let cards = document.getElementsByClassName("card");

  for (let i = 0; i < cards.length; i++) {
    let text = cards[i].innerText.toLowerCase();
    if (text.includes(input)) {
      cards[i].style.display = "block";
    } else {
      cards[i].style.display = "none";
    }
  }
}
</script>

</body>
</html>
