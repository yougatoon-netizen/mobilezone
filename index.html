<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobile Zone</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  background:#f5f5f5;
}

/* HEADER */
header{
  background:#000;
  color:white;
  padding:10px;
}
.header-container{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
}
.header-container img{
  width:45px;
  height:45px;
  border-radius:50%;
}

/* SEARCH */
.search-box{
  padding:10px;
  text-align:center;
  background:white;
}
.search-box input{
  width:90%;
  padding:10px;
  border-radius:20px;
  border:1px solid #ddd;
}

/* NAV */
.nav{
  display:flex;
  justify-content:space-around;
  background:white;
  padding:10px;
  border-bottom:1px solid #ddd;
}
.nav span{
  cursor:pointer;
  font-weight:bold;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
  padding:10px;
}
.card{
  background:white;
  border-radius:12px;
  padding:10px;
  text-align:center;
}
.card img{
  width:100%;
  height:140px;
  object-fit:cover;
  border-radius:10px;
}
.price{
  color:#000;
  font-weight:bold;
}
.btn{
  background:#000;
  color:white;
  padding:8px;
  border:none;
  border-radius:10px;
}

/* CART */
.cart{
  text-align:center;
  padding:10px;
}

/* CHECKOUT */
.checkout{
  background:white;
  padding:15px;
  margin:10px;
  border-radius:10px;
}
.checkout input, .checkout select{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:8px;
  border:1px solid #ddd;
}
.checkout button{
  width:100%;
  padding:12px;
  background:#000;
  color:white;
  border:none;
  border-radius:10px;
}

/* WHATSAPP */
.whatsapp{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  color:white;
  padding:14px;
  border-radius:50%;
  text-decoration:none;
}
</style>
</head>

<body>

<header>
  <div class="header-container">
    <img src="logo.jpg">
    <span>MOBILE ZONE</span>
  </div>
</header>

<div class="search-box">
<input type="text" id="search" onkeyup="searchProducts()" placeholder="Search...">
</div>

<div class="nav">
  <span onclick="filterCategory('all')">All</span>
  <span onclick="filterCategory('iphone')">iPhone</span>
  <span onclick="filterCategory('samsung')">Samsung</span>
</div>

<div class="cart">
🛒 Items: <span id="cartCount">0</span>
<p id="total"></p>
</div>

<div class="grid" id="productList"></div>

<div class="checkout">
<h3>Checkout</h3>
<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="address" placeholder="Address">
<select id="payment">
<option>Cash on Delivery</option>
<option>Bank Transfer</option>
</select>
<button onclick="placeOrder()">Place Order</button>
</div>

<a class="whatsapp" href="https://wa.me/26879762802">💬</a>

<script>

const products = [

{name:"Samsung S24 Ultra", price:18000, category:"samsung", img:"https://images.unsplash.com/photo-1610792516307-ea5acd9c3b00?w=500"},
{name:"Samsung S25 Ultra", price:20000, category:"samsung", img:"https://images.unsplash.com/photo-1610792516307-ea5acd9c3b00?w=500"},
{name:"Samsung S26 Ultra", price:22000, category:"samsung", img:"https://images.unsplash.com/photo-1610792516307-ea5acd9c3b00?w=500"}

];

let cart = [];
let currentCategory="all";

function renderProducts(){
  let filtered = products.filter(p => currentCategory==="all" || p.category===currentCategory);
  let html="";
  filtered.forEach(p=>{
    html+=`
    <div class="card">
      <img src="${p.img}">
      <h4>${p.name}</h4>
      <p class="price">R ${p.price}</p>
      <button class="btn" onclick="addToCart('${p.name}',${p.price})">Add</button>
    </div>`;
  });
  document.getElementById("productList").innerHTML=html;
}

function filterCategory(cat){
  currentCategory=cat;
  renderProducts();
}

function addToCart(name,price){
  cart.push({name,price});
  document.getElementById("cartCount").innerText=cart.length;
}

function searchProducts(){
  let input=document.getElementById("search").value.toLowerCase();
  let filtered=products.filter(p=>p.name.toLowerCase().includes(input));
  let html="";
  filtered.forEach(p=>{
    html+=`
    <div class="card">
      <img src="${p.img}">
      <h4>${p.name}</h4>
      <p class="price">R ${p.price}</p>
      <button class="btn" onclick="addToCart('${p.name}',${p.price})">Add</button>
    </div>`;
  });
  document.getElementById("productList").innerHTML=html;
}

function placeOrder(){
  alert("Order sent on WhatsApp 👍");
}

renderProducts();

</script>

</body>
</html>
