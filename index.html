<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobile Zone</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  background:#f5f5f5;
}

/* HEADER */
header{
  background:#ff6a00;
  color:white;
  padding:10px;
}

.header-container{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
}

.header-container img{
  width:45px;
  height:45px;
  border-radius:50%;
  object-fit:cover;
}

.header-container span{
  font-size:22px;
  font-weight:bold;
}

/* SEARCH */
.search-box{
  padding:10px;
  text-align:center;
  background:white;
}
.search-box input{
  width:90%;
  padding:10px;
  border-radius:20px;
  border:1px solid #ddd;
}

/* NAV */
.nav{
  display:flex;
  justify-content:space-around;
  background:white;
  padding:10px;
  border-bottom:1px solid #ddd;
}

/* BANNER */
.banner img{
  width:100%;
  height:180px;
  object-fit:cover;
}

/* CART */
.cart{
  text-align:center;
  padding:10px;
}

/* PRODUCTS */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
  padding:10px;
}

.card{
  background:white;
  border-radius:12px;
  padding:10px;
  text-align:center;
  box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.card img{
  width:100%;
  height:140px;
  object-fit:cover;
  border-radius:10px;
}

.price{
  color:#ff6a00;
  font-weight:bold;
}

.btn{
  background:#ff6a00;
  color:white;
  padding:8px;
  border:none;
  border-radius:10px;
  margin-top:5px;
  cursor:pointer;
}

/* CHECKOUT */
.checkout{
  background:white;
  padding:15px;
  margin:10px;
  border-radius:10px;
}
.checkout input, .checkout select{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:8px;
  border:1px solid #ddd;
}
.checkout button{
  width:100%;
  padding:12px;
  background:#ff6a00;
  color:white;
  border:none;
  border-radius:10px;
}

/* WHATSAPP */
.whatsapp{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  color:white;
  padding:14px;
  border-radius:50%;
  text-decoration:none;
}
</style>
</head>

<body>

<header>
  <div class="header-container">
    <img src="logo.jpg" alt="Mobile Zone Logo">
    <span>MOBILE ZONE</span>
  </div>
</header>

<div class="search-box">
<input type="text" id="search" onkeyup="searchProducts()" placeholder="Search iPhones...">
</div>

<div class="nav">
<span>iPhone 11</span>
<span>iPhone 12</span>
<span>iPhone 13</span>
<span>iPhone 14+</span>
</div>

<div class="banner">
<img src="https://images.unsplash.com/photo-1603898037225-1c7d1d6b8c2f?w=1200">
</div>

<div class="cart">
🛒 Items: <span id="cartCount">0</span>
<p id="total"></p>
</div>

<div class="grid" id="productList"></div>

<div class="checkout">
<h3>Checkout</h3>
<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="address" placeholder="Address">

<select id="payment">
<option>Cash on Delivery</option>
<option>Bank Transfer</option>
</select>

<button onclick="placeOrder()">Place Order</button>
</div>

<a class="whatsapp" href="https://wa.me/26879762802">💬</a>

<script>
const products = [
{name:"iPhone 11", price:4300, img:"https://images.unsplash.com/photo-1570913149827-d2ac84ab3f9a?w=500"},
{name:"iPhone 11 Pro", price:4800, img:"https://images.unsplash.com/photo-1570913149827-d2ac84ab3f9a?w=500"},
{name:"iPhone 11 Pro Max", price:6000, img:"https://images.unsplash.com/photo-1570913149827-d2ac84ab3f9a?w=500"},

{name:"iPhone 12", price:5000, img:"https://images.unsplash.com/photo-1605236453806-6ff36851218e?w=500"},
{name:"iPhone 12 Mini", price:4000, img:"https://images.unsplash.com/photo-1605236453806-6ff36851218e?w=500"},
{name:"iPhone 12 Pro", price:7000, img:"https://images.unsplash.com/photo-1605236453806-6ff36851218e?w=500"},
{name:"iPhone 12 Pro Max", price:9000, img:"https://images.unsplash.com/photo-1605236453806-6ff36851218e?w=500"},

{name:"iPhone 13", price:7500, img:"https://images.unsplash.com/photo-1632661674596-df8be070a5c5?w=500"},
{name:"iPhone 13 Mini", price:7000, img:"https://images.unsplash.com/photo-1632661674596-df8be070a5c5?w=500"},
{name:"iPhone 13 Pro", price:10000, img:"https://images.unsplash.com/photo-1632661674596-df8be070a5c5?w=500"},
{name:"iPhone 13 Pro Max", price:12000, img:"https://images.unsplash.com/photo-1632661674596-df8be070a5c5?w=500"},

{name:"iPhone 14", price:8000, img:"https://images.unsplash.com/photo-1664478546385-7f4a1c2cc74e?w=500"},
{name:"iPhone 14 Plus", price:9000, img:"https://images.unsplash.com/photo-1664478546385-7f4a1c2cc74e?w=500"},
{name:"iPhone 14 Pro", price:11000, img:"https://images.unsplash.com/photo-1664478546385-7f4a1c2cc74e?w=500"},
{name:"iPhone 14 Pro Max", price:13500, img:"https://images.unsplash.com/photo-1664478546385-7f4a1c2cc74e?w=500"}
];

let cart = [];

function renderProducts(){
  let html = "";
  products.forEach(p=>{
    html += `
    <div class="card">
      <img src="${p.img}">
      <h4>${p.name}</h4>
      <p class="price">R ${p.price}</p>
      <button class="btn" onclick="addToCart('${p.name}', ${p.price})">Add</button>
    </div>`;
  });
  document.getElementById("productList").innerHTML = html;
}

function addToCart(name, price){
  cart.push({name, price});
  updateCart();
}

function updateCart(){
  document.getElementById("cartCount").innerText = cart.length;
  let total = cart.reduce((sum,i)=>sum+i.price,0);
  document.getElementById("total").innerText = "Total: R " + total;
}

function searchProducts(){
  let input = document.getElementById("search").value.toLowerCase();
  let filtered = products.filter(p => p.name.toLowerCase().includes(input));

  let html = "";
  filtered.forEach(p=>{
    html += `
    <div class="card">
      <img src="${p.img}">
      <h4>${p.name}</h4>
      <p class="price">R ${p.price}</p>
      <button class="btn" onclick="addToCart('${p.name}', ${p.price})">Add</button>
    </div>`;
  });

  document.getElementById("productList").innerHTML = html;
}

function placeOrder(){
  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let address = document.getElementById("address").value;

  if(!name || !phone || !address){
    alert("Fill all fields");
    return;
  }

  let total = cart.reduce((sum,i)=>sum+i.price,0);

  let msg = "🛒 ORDER%0A";
  msg += "Name: " + name + "%0A";
  msg += "Phone: " + phone + "%0A";
  msg += "Address: " + address + "%0A%0A";

  cart.forEach(i=>{
    msg += "- " + i.name + " (R " + i.price + ")%0A";
  });

  msg += "%0ATotal: R " + total;

  window.open("https://wa.me/26879762802?text=" + msg);
}

renderProducts();
</script>

</body>
</html>
