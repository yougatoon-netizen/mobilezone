<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobile Zone</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  background:#f5f5f5;
}

header{
  background:red;
  color:white;
  padding:10px;
}

.header-container{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
}

.header-container img{
  width:45px;
  height:45px;
  border-radius:50%;
}

.search-box{
  padding:10px;
  text-align:center;
  background:white;
}

.search-box input{
  width:90%;
  padding:10px;
  border-radius:20px;
  border:1px solid #ddd;
}

.nav{
  display:flex;
  justify-content:space-around;
  background:white;
  padding:10px;
  border-bottom:1px solid #ddd;
}

.nav span{
  cursor:pointer;
  font-weight:bold;
}

.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
  padding:10px;
}

.card{
  background:white;
  border-radius:12px;
  padding:10px;
  text-align:center;
}

.card img{
  width:100%;
  height:140px;
  object-fit:cover;
  border-radius:10px;
}

.price{
  color:red;
  font-weight:bold;
}

.btn{
  background:red;
  color:white;
  padding:8px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.cart{
  text-align:center;
  padding:10px;
}

.checkout{
  background:white;
  padding:15px;
  margin:10px;
  border-radius:10px;
}

.checkout input, .checkout select{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:8px;
  border:1px solid #ddd;
}

.checkout button{
  width:100%;
  padding:12px;
  background:red;
  color:white;
  border:none;
  border-radius:10px;
}

.whatsapp{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  color:white;
  padding:14px;
  border-radius:50%;
  text-decoration:none;
}
</style>

</head>

<body>

<header>
  <div class="header-container">
    <img src="logo.png">
    <span>MOBILE ZONE</span>
  </div>
</header>

<div class="search-box">
<input type="text" id="search" onkeyup="searchProducts()" placeholder="Search products...">
</div>

<!-- NAV -->
<div class="nav">
  <span onclick="filterCategory('all')">All</span>
  <span onclick="filterCategory('iphone')">iPhone</span>
  <span onclick="filterCategory('samsung')">Samsung</span>
  <span onclick="filterCategory('accessories')">Accessories</span>
</div>

<div class="cart">
🛒 Items: <span id="cartCount">0</span>
</div>

<div class="grid" id="productList"></div>

<!-- CHECKOUT -->
<div class="checkout">
<h3>Checkout</h3>
<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="address" placeholder="Address">

<select>
<option>Cash on Delivery</option>
<option>Bank Transfer</option>
</select>

<button onclick="placeOrder()">Place Order</button>
</div>

<a class="whatsapp" href="https://wa.me/26879762802">💬</a>

<script>

{name:"Samsung A54", price:8000, category:"samsung", img:"https://fdn2.gsmarena.com/vv/bigpic/samsung-galaxy-a54-5g.jpg"},
{name:"Samsung S23 Ultra", price:18000, category:"samsung", img:"https://fdn2.gsmarena.com/vv/bigpic/samsung-galaxy-s23-ultra.jpg"}

];

let cart=[];
let currentCategory="all";

function renderProducts(){
let filtered = products.filter(p =>
currentCategory==="all" || p.category===currentCategory
);

let html="";
filtered.forEach(p=>{
html+=`
<div class="card">
<img src="${p.img}">
<h4>${p.name}</h4>
<p class="price">R ${p.price}</p>
<button class="btn" onclick="addToCart()">Add</button>
</div>`;
});

document.getElementById("productList").innerHTML=html;
}

function filterCategory(cat){
currentCategory=cat;
renderProducts();
}

function addToCart(){
cart.push(1);
document.getElementById("cartCount").innerText=cart.length;
}

function searchProducts(){
let val=document.getElementById("search").value.toLowerCase();

let filtered=products.filter(p=>
p.name.toLowerCase().includes(val)
);

let html="";
filtered.forEach(p=>{
html+=`
<div class="card">
<img src="${p.img}">
<h4>${p.name}</h4>
<p class="price">R ${p.price}</p>
<button class="btn" onclick="addToCart()">Add</button>
</div>`;
});

document.getElementById("productList").innerHTML=html;
}

function placeOrder(){
alert("Order placed successfully 👍");
}

renderProducts();

</script>

</body>
</html>
