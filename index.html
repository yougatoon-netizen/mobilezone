<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobile Zone</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  background:#0b0b0b;
  color:white;
}

/* HEADER */
header{
  background:#000;
  color:red;
  text-align:center;
  padding:18px;
  font-size:22px;
  font-weight:bold;
  border-bottom:2px solid red;
}

/* HERO */
.hero{
  text-align:center;
  padding:40px 15px;
}

.hero h1{
  color:red;
  font-size:38px;
}

.hero p{
  color:#bbb;
}

.btn{
  display:inline-block;
  margin-top:15px;
  padding:12px 20px;
  background:red;
  color:white;
  border-radius:25px;
  text-decoration:none;
  font-weight:bold;
}

/* PRODUCTS */
.section{
  padding:20px;
  text-align:center;
}

.grid{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:15px;
}

.card{
  background:#1a1a1a;
  width:170px;
  border-radius:15px;
  padding:15px;
  border:1px solid red;
  text-align:center;
}

/* IMAGE */
.card img{
  width:100%;
  border-radius:10px;
  margin-bottom:10px;
}

/* PRICE */
.price{
  color:red;
  font-weight:bold;
  margin:5px 0;
}

/* WHATSAPP */
.whatsapp{
  position:fixed;
  bottom:20px;
  right:20px;
  background:red;
  color:white;
  padding:14px 16px;
  border-radius:50px;
  text-decoration:none;
  font-weight:bold;
  box-shadow:0 5px 15px rgba(255,0,0,0.4);
}
</style>

</head>

<body>

<header>
📱 MOBILE ZONE - BLACK EDITION
</header>

<div class="hero">
<h1>Premium Mobile Store</h1>
<p>Phones • Accessories • Repairs</p>
<a class="btn" href="https://wa.me/26879762802">Order on WhatsApp</a>
</div>

<div class="section">
<h2 style="color:red;">🔥 Our Products</h2>

<div class="grid">

<div class="card">
<img src="https://via.placeholder.com/150" alt="iPhone">
<h3>iPhone 13</h3>
<p class="price">R 10,500</p>
<a class="btn" href="https://wa.me/26879762802">Buy Now</a>
</div>

<div class="card">
<img src="https://via.placeholder.com/150" alt="Samsung">
<h3>Samsung S21</h3>
<p class="price">R 8,900</p>
<a class="btn" href="https://wa.me/26879762802">Buy Now</a>
</div>

<div class="card">
<img src="https://via.placeholder.com/150" alt="AirPods">
<h3>AirPods</h3>
<p class="price">R 1,200</p>
<a class="btn" href="https://wa.me/26879762802">Buy Now</a>
</div>

<div class="card">
<img src="https://via.placeholder.com/150" alt="Charger">
<h3>Fast Charger</h3>
<p class="price">R 250</p>
<a class="btn" href="https://wa.me/26879762802">Buy Now</a>
</div>

</div>
</div>

<a class="whatsapp" href="https://wa.me/26879762802">
💬 Chat
</a>

</body>
</html>
