<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobile Zone</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  background:#0b0b0b;
  color:white;
}

/* HEADER */
header{
  background:black;
  text-align:center;
  padding:18px;
  font-size:24px;
  font-weight:bold;
  color:red;
  border-bottom:2px solid red;
}

/* SEARCH */
.search-box{
  text-align:center;
  padding:10px;
}

.search-box input{
  width:80%;
  padding:10px;
  border-radius:20px;
  border:none;
  text-align:center;
}

/* CART */
.cart{
  text-align:center;
  padding:10px;
  color:white;
}

/* GRID */
.grid{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:15px;
  padding:10px;
}

/* CARD */
.card{
  background:#1a1a1a;
  width:170px;
  border-radius:15px;
  padding:15px;
  border:1px solid red;
  text-align:center;
}

.card img{
  width:100%;
  border-radius:10px;
}

.price{
  color:red;
  font-weight:bold;
}

.btn{
  display:block;
  margin-top:8px;
  padding:8px;
  background:red;
  color:white;
  border-radius:20px;
  text-decoration:none;
  cursor:pointer;
}

/* CHECKOUT */
.checkout{
  text-align:center;
  padding:15px;
}

.checkout input{
  width:80%;
  padding:10px;
  margin:5px;
  border-radius:10px;
  border:none;
}

.checkout button{
  padding:12px 20px;
  background:red;
  color:white;
  border:none;
  border-radius:20px;
  font-weight:bold;
  cursor:pointer;
}

/* WHATSAPP */
.whatsapp{
  position:fixed;
  bottom:20px;
  right:20px;
  background:red;
  color:white;
  padding:14px 16px;
  border-radius:50px;
  text-decoration:none;
}
</style>

</head>

<body>

<header>
📱 MOBILE ZONE
</header>

<div class="search-box">
<input type="text" id="search" onkeyup="searchProducts()" placeholder="Search products...">
</div>

<div class="cart">
🛒 Cart Items: <span id="cartCount">0</span>
</div>

<div class="grid" id="productList">

<div class="card">
<img src="https://via.placeholder.com/150">
<h3>iPhone 13</h3>
<p class="price">R 10,500</p>
<button class="btn" onclick="addToCart('iPhone 13')">Add to Cart</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/150">
<h3>Samsung S21</h3>
<p class="price">R 8,900</p>
<button class="btn" onclick="addToCart('Samsung S21')">Add to Cart</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/150">
<h3>AirPods</h3>
<p class="price">R 1,200</p>
<button class="btn" onclick="addToCart('AirPods')">Add to Cart</button>
</div>

</div>

<!-- CHECKOUT FORM -->
<div class="checkout">
<h2 style="color:red;">Checkout</h2>
<input type="text" id="name" placeholder="Your Name">
<input type="text" id="address" placeholder="Your Address">
<input type="text" id="phone" placeholder="Phone Number">
<br><br>
<button onclick="placeOrder()">Place Order on WhatsApp</button>
</div>

<a class="whatsapp" href="https://wa.me/26879762802">💬</a>

<script>

let cart = [];
let cartCount = 0;

// ADD TO CART
function addToCart(product){
  cart.push(product);
  cartCount++;
  document.getElementById("cartCount").innerText = cartCount;
}

// SEARCH
function searchProducts(){
  let input = document.getElementById("search").value.toLowerCase();
  let cards = document.getElementsByClassName("card");

  for(let i=0;i<cards.length;i++){
    let text = cards[i].innerText.toLowerCase();
    if(text.includes(input)){
      cards[i].style.display="block";
    }else{
      cards[i].style.display="none";
    }
  }
}

// CHECKOUT
function placeOrder(){
  let name = document.getElementById("name").value;
  let address = document.getElementById("address").value;
  let phone = document.getElementById("phone").value;

  let message = "New Order:%0A";
  message += "Name: " + name + "%0A";
  message += "Address: " + address + "%0A";
  message += "Phone: " + phone + "%0A";
  message += "Products: " + cart.join(", ");

  let url = "https://wa.me/26879762802?text=" + message;

  window.open(url, "_blank");
}

</script>

</body>
</html>
