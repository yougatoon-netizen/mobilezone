<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobile Zone</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  background:#0b0b0b;
  color:white;
}

/* HEADER */
header{
  background:white;
  text-align:center;
  padding:18px;
  font-size:24px;
  font-weight:bold;
  color:black;
  border-bottom:2px solid red;
}

/* HERO */
.hero{
  text-align:center;
  padding:30px 15px;
}

.hero h1{
  font-size:38px;
  margin:0;
  color:red;
}

.hero p{
  color:#bbb;
}

/* GRID */
.grid{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:15px;
  padding:15px;
}

/* CARD */
.card{
  background:#1a1a1a;
  width:170px;
  border-radius:15px;
  padding:15px;
  border:1px solid red;
}

/* IMAGE */
.card img{
  width:100%;
  border-radius:10px;
}

/* PRICE */
.price{
  color:red;
  font-weight:bold;
  margin:5px 0;
}

/* BUTTON */
.btn{
  display:block;
  margin-top:10px;
  padding:10px;
  background:red;
  color:white;
  text-align:center;
  border-radius:20px;
  text-decoration:none;
  font-weight:bold;
}

/* WHATSAPP */
.whatsapp{
  position:fixed;
  bottom:20px;
  right:20px;
  background:red;
  color:white;
  padding:14px 16px;
  border-radius:50px;
  text-decoration:none;
  font-weight:bold;
}
</style>

</head>

<body>

<header>
📱 MOBILE ZONE
</header>

<div class="hero">
<h1>Welcome</h1>
<p>Phones • Accessories • Repair</p>
</div>

<div class="grid">

<div class="card">
<img src="https://via.placeholder.com/150">
<h3>iPhone 13</h3>
<p class="price">R 10,500</p>
<a class="btn" href="https://wa.me/26879762802">Buy</a>
</div>

<div class="card">
<img src="https://via.placeholder.com/150">
<h3>Samsung S21</h3>
<p class="price">R 8,900</p>
<a class="btn" href="https://wa.me/26879762802">Buy</a>
</div>

<div class="card">
<img src="https://via.placeholder.com/150">
<h3>AirPods</h3>
<p class="price">R 1,200</p>
<a class="btn" href="https://wa.me/26879762802">Buy</a>
</div>

<div class="card">
<img src="https://via.placeholder.com/150">
<h3>Charger</h3>
<p class="price">R 250</p>
<a class="btn" href="https://wa.me/26879762802">Buy</a>
</div>

</div>

<a class="whatsapp" href="https://wa.me/26879762802">
💬
</a>

</body>
</html>
