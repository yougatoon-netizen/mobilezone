<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobile Zone</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  background:#0d0d0d;
  color:white;
}

/* HEADER */
header{
  background:black;
  color:red;
  text-align:center;
  padding:18px;
  font-size:22px;
  font-weight:bold;
  border-bottom:2px solid red;
}

/* HERO */
.hero{
  text-align:center;
  padding:40px 15px;
}

.hero h1{
  font-size:36px;
  color:red;
}

.hero p{
  color:#ccc;
}

/* BUTTON */
.btn{
  display:inline-block;
  margin-top:15px;
  padding:12px 22px;
  background:red;
  color:white;
  border-radius:25px;
  text-decoration:none;
  font-weight:bold;
}

/* SECTION */
.section{
  padding:20px;
  text-align:center;
}

.grid{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:15px;
}

/* PRODUCT CARD */
.card{
  background:#1a1a1a;
  width:160px;
  border-radius:15px;
  padding:15px;
  border:1px solid red;
}

.card h4{
  color:white;
}

.price{
  color:red;
  font-weight:bold;
}

/* WHATSAPP BUTTON */
.whatsapp{
  position:fixed;
  bottom:20px;
  right:20px;
  background:red;
  color:white;
  padding:14px 16px;
  border-radius:50px;
  text-decoration:none;
  font-weight:bold;
  box-shadow:0 5px 15px rgba(255,0,0,0.3);
}
</style>

</head>

<body>

<header>
📱 MOBILE ZONE
</header>

<div class="hero">
<h1>BLACK EDITION STORE</h1>
<p>Phones • Accessories • Repair</p>
<a class="btn" href="https://wa.me/26879762802">Order Now</a>
</div>

<div class="section">
<h2 style="color:red;">🔥 Our Products</h2>

<div class="grid">

<div class="card">
<h4>iPhone 13</h4>
<p class="price">R 10,500</p>
<a class="btn" href="https://wa.me/26879762802">Buy</a>
</div>

<div class="card">
<h4>Samsung S21</h4>
<p class="price">R 8,900</p>
<a class="btn" href="https://wa.me/26879762802">Buy</a>
</div>

<div class="card">
<h4>AirPods</h4>
<p class="price">R 1,200</p>
<a class="btn" href="https://wa.me/26879762802">Buy</a>
</div>

</div>
</div>

<a class="whatsapp" href="https://wa.me/26879762802">
💬 Chat
</a>

</body>
</html>
