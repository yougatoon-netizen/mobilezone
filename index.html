<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobile Zone</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  background:#0b0b0b;
  color:white;
}

header{
  background:black;
  text-align:center;
  padding:18px;
  font-size:24px;
  font-weight:bold;
  color:red;
  border-bottom:2px solid red;
}

/* GRID */
.grid{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:15px;
  padding:10px;
}

.card{
  background:#1a1a1a;
  width:170px;
  border-radius:15px;
  padding:15px;
  border:1px solid red;
  text-align:center;
}

.card img{
  width:100%;
  height:130px;
  object-fit:cover;
  border-radius:10px;
}

.price{
  color:red;
  font-weight:bold;
}

/* ADMIN */
.admin{
  text-align:center;
  padding:15px;
  border-top:2px solid red;
}

.admin input{
  width:80%;
  padding:10px;
  margin:5px;
  border-radius:10px;
  border:none;
}

.admin button{
  padding:10px 15px;
  background:red;
  color:white;
  border:none;
  border-radius:20px;
  cursor:pointer;
}

/* WHATSAPP */
.whatsapp{
  position:fixed;
  bottom:20px;
  right:20px;
  background:red;
  color:white;
  padding:14px;
  border-radius:50px;
  text-decoration:none;
}
</style>

</head>

<body>

<header>📱 MOBILE ZONE</header>

<div class="grid" id="productList"></div>

<!-- ADMIN PANEL -->
<div class="admin">
<h2 style="color:red;">Admin Panel</h2>

<input type="text" id="name" placeholder="Product Name">
<input type="text" id="price" placeholder="Price (R)">
<input type="text" id="image" placeholder="Image URL">

<br>
<button onclick="addProduct()">Add Product</button>
</div>

<a class="whatsapp" href="https://wa.me/26879762802">💬</a>

<script>

function addProduct(){

  let name = document.getElementById("name").value;
  let price = document.getElementById("price").value;
  let image = document.getElementById("image").value;

  let card = document.createElement("div");
  card.className = "card";

  card.innerHTML = `
    <img src="${image}">
    <h3>${name}</h3>
    <p class="price">R ${price}</p>
  `;

  document.getElementById("productList").appendChild(card);

  document.getElementById("name").value = "";
  document.getElementById("price").value = "";
  document.getElementById("image").value = "";
}

</script>

</body>
</html>
